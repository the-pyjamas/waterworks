name: Feature / Enhancement
description: Propose a new feature or an improvement to an existing one.

body:
  - type: textarea
    id: problem

    attributes:
      label: Problem Statement
      description: |
        What problem does this feature solve?
        If this is an enhancement, what is currently missing or insufficient?
        OR, describe your proposed sulution.
        Be as clear and specifiec as possible.

    validations:
      required: true

  - type: checkboxes
    id: type

    attributes:
      label: Type
      description: Which type of changes it is?
      options:
        - label: Implementation
        - label: Authentication
        - label: Authorization / Permissions
        - label: Configuration
        - label: Documentation
        - label: Tests
        - label: Other
