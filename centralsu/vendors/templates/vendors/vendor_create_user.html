{% extends 'base.html' %}
{% load static %}


{% block content %}

    <div class="authentication-wrapper basic-authentication" style="margin-top: 5%;">
        <div class="authentication-inner">
            <div class="card" style="margin-top: 4%;">
                <div class="authentication-top text-center mb-25">
                    <!-- <a class="authentication-logo logo-black" href="javascript:;">
                        <img alt="logo" src="{% static 'images/logo/logo-black.svg' %}" />
                    </a>
                    <a class="authentication-logo logo-white" href="javascript:;">
                        <img alt="logo" src="{% static 'images/logo/logo-white.svg' %}" />
                    </a> -->
                    <h4 class="mb-5">ثبت فروشنده جدید</h4>
                </div>

                <form action="" class="" method="POST">
                    {% csrf_token %}
                    {{ form.non_field_errors }}

					{% for field in form.visible_fields %}
						<div class="mb-10">
							<label class="form-label" for="nameEmail">{{ field.label }}</label>
							{{ field }}
						</div>
					{% endfor %}

                    <div class="mb-25">
                        <button class="btn btn-primary w-100" type="submit">
							بعدی
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

{% endblock content %}
