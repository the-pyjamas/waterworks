{% load static %}

<!-- app-header -->
<div class="app-header-area">

    <header class="app-header" id="header">
        <div class="app-header-inner">
            <div class="app-header-left">
                <div class="d-flex align-center gap-15">
                    <div class="app-header-element">
                        <a
                        class="sidebar-toggle-bar"
                        href="javascript:void(0);"
                        id="sidebarToggle"
                        >
                        <div class="sidebar-menu-bar">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                        </a>
                    </div>
                    <div class="app-header-ls-logo">
                        <!-- large screen logo -->
                        <a class="app-header-ls-dark-logo" href="{% url 'dashboard:dashboard' %}">
                            <img alt="image" src="{% static 'images/logo/logo-black.svg' %}" />
                        </a>
                        <a class="app-header-ls-light-logo" href="{% url 'dashboard:dashboard' %}">
                            <img alt="image" src="{% static 'images/logo/logo-white.svg' %}" />
                        </a>
                    </div>
                    <div class="app-header-mobile-logo">
                        <a class="app-header-dark-logo" href="{% url 'dashboard:dashboard' %}">
                            <img alt="image" src="{% static 'images/logo/mobile-logo.svg' %}" />
                        </a>
                        <a class="app-header-light-logo" href="{% url 'dashboard:dashboard' %}">
                            <img
                                alt="image"
                                src="{% static 'images/logo/mobile-logo-light.svg' %}"
                            />
                        </a>
                    </div>
                </div>
                <div class="app-header-search d-none d-lg-block">
                    <form action="#">
                        <input
                        class="form-control"
                        placeholder="جستجو ..."
                        type="text"
                        />
                        <button type="submit">
                            <i class="ri-search-line"></i>
                        </button>
                    </form>
                </div>
            </div>
            <div class="app-header-right">
                <div class="app-header-search-modal">
                    <button
                        class="app-header-circle"
                        data-bs-target="#searchModal"
                        data-bs-toggle="modal"
                        type="button"
                    >
                        <i class="ri-search-line"></i>
                    </button>
                </div>

                <!-- LANGUAGES SWITCHER -->
                <div class="app-header-link">
                    <div class="dropdown">
                        <a
                            aria-expanded="false"
                            class="dropdown-toggle"
                            data-bs-toggle="dropdown"
                            href="javascript:void(0);"
                            role="button">
                            <span class="app-header-circle">
                                <i class="ri-global-line"></i>
                            </span>
                        </a>
                        <ul class="dropdown-menu">
                            <li>
                                <a class="dropdown-lang" href="javascript:void(0);">
                                    <img
                                    alt="image not found"
                                    src="{% static 'images/flags/us-flag.jpg' %}"/>
                                    انگلیسی
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>

                <!-- THEME SWITCHER -->
                <div class="app-header-switcher app-header-circle">
                    <div class="theme-switcher">
                        <i class="ri-sun-line change-theme theme-button"></i>
                    </div>
                </div>

                <!-- FULLSCREEN SWITCHER -->
                <div class="app-header-fullscreen app-header-circle cursor-pointer">
                    <div onclick="javascript:toggleFullScreen()">
                        <i class="ri-fullscreen-line"></i>
                    </div>
                </div>

                <div class="app-header-user">
                    <div class="dropdown">
                        {% if request.user.is_authenticated %}
                            <a
                                aria-expanded="false"
                                class="dropdown-toggle"
                                data-bs-toggle="dropdown"
                                href="javascript:void(0);"
                                role="button"
                            >

                                <div class="author">

                                    <div class="author-thumb">
                                        <img
                                        alt="user"
                                        src="{% static 'images/avatar/avatar-thumb-018.webp' %}"
                                        />
                                    </div>
                                </div>
                            </a>
                        {% else %}
                            <a
                                aria-expanded="false"
                                class="dropdown-toggle"
                                data-bs-toggle="dropdown"
                                role="button"
                            >

                                <div class="author">
                                    <div class="author-thumb">
                                        <img
                                        alt="user"
                                        src="{% static 'images/avatar/avatar-thumb-018.webp' %}"
                                        />
                                    </div>
                                </div>
                            </a>
                        {% endif %}
                        <ul class="dropdown-menu">
                            {% if request.user.is_authenticated %}
                                <li class="bd-user-info-list">
                                    <p style="font-size: 1.8rem; font-weight: bold;">
                                        {{ request.user.userprofile.fullname }}
                                    </p>
                                </li>
                                <hr>
                                <li class="bd-user-info-list">
                                    <a href="{% url 'accounts:user-profile-update' %}">
                                        <i class="ri-user-line"></i>
                                        مشخصات
                                    </a>
                                </li>
                                <hr>
                                <li class="bd-user-info-list">
                                    <a href="{% url 'accounts:user-logout' %}">
                                        <i class="ri-logout-circle-line"></i>
                                        خروج از سیستم
                                    </a>
                                </li>
                            {% else %}
                                <li class="bd-user-info-list">
                                    <a href="{% url 'accounts:user-login' %}">
                                        <i class="ri-logout-circle-line"></i>
                                        ورود به سیستم
                                    </a>
                                </li>
                                <li class="bd-user-info-list">
                                    <a href="{% url 'accounts:user-register' %}">
                                        <i class="ri-logout-circle-line"></i>
                                        ثبت‌نام در سیستم
                                    </a>
                                </li>
                            {% endif %}
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="body__overlay"></div>

</div>
