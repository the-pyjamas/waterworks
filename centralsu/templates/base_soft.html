{% load static %}

<!doctype html>
<html class="no-js" lang="fa">
<head>
    {% include 'includes/head.html' %}
</head>

<style>
	/*
	Override the 'btn-primary' and `text-primary` styles
	to show a better background color and font color.
	Fix the margin. 
	*/
	.btn-primary {
		background-color: #1E88E5 !important;
		margin-top: 2%;
	}
	.btn-primary:hover {
		background-color: #1E88E5 !important;
		color: #F8F8F8 !important;
	}
    .btn-light:hover {
        color: #1672c2 !important;
    }

	.text-primary {
		color: #1672c2 !important;
	}
    a {
        color: #1672c2 !important;
    }

	.form-control:focus {
		border-color: #add4f6 !important;
	}
</style>

{% block extra_style %}
{% endblock extra_style %}

<body class="body-area" style="background-color: #F8F8F8;">
    <div class="page" style="width: 88%;">

        {% block content %}
        {% endblock content %}

    </div>

    {% include 'includes/preloader.html' %}
    {% include 'includes/js_links.html' %}
</body>

</html>
