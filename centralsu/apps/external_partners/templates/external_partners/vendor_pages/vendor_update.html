{% extends 'base.html' %}


{% block content %}

    <main class="seller-edit-page">
        <div class="seller-edit-card">

            <header class="seller-edit-header">
                <h1>ویرایش فروشنده</h1>
                <p>ویرایش اطلااعات کَسب فروشنده</p>
            </header>

            <form class="seller-edit-form" method="post">
                {% csrf_token %}

                <div class="seller-edit-grid">

                    {% for field in form %}
                        {% if field.name == 'is_active' %}
                            <div class="technician-status-checkbox">
                                <label class="ps-2">{{ field.label }}</label>
                                <span>{{ field }}</span>
                            </div>
                        {% else %}
                            <div class="seller-edit-field">
                                <label>{{ field.label }}</label>
                                <span>{{ field }}</span>
                            </div>
                        {% endif %}

                    {% endfor %}

                </div>

                <div class="seller-edit-actions">
                    <button type="button" class="btn-sub">لغو تغییرات</button>
                    <button type="submit" class="btn-main">ذخیره تغییرات</button>
                </div>

            </form>

        </div>
    </main>

{% endblock content %}
