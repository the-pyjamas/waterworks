{% extends 'base.html' %}

{% block title %}ثبت فروشنده{% endblock title %}


{% block content %}

    <main class="form-container">
        <div class="form-card">
            <h2 class="form-title">اطلاعات کاری</h2>

            <!-- Progress Bar -->
            <div class="form-steps">
                <div class="form-step is-completed">۱</div>
                <div class="form-step is-completed">۲</div>
                <div class="form-step is-active">۳</div>
            </div>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- Row for Shop Name and Work Email -->
                <div class="form-grid-2">
                    <div class="form-group">
                        <label>نام فروشگاه</label>
                        <input type="text" placeholder="مثلاً: ابزار مرکزی" name="shop_name">
                    </div>
                    <div class="form-group">
                        <label>ایمیل کاری</label>
                        <input type="email" placeholder="example@shop.com" name="contact_email">
                    </div>
                </div>

                <!-- Business Phone field -->
                <div class="form-group">
                    <label>شماره تماس کَسـب</label>
                    <input type="tel" placeholder="۰۲۱-۸۸۸۸۰۰۰۰" name="contact_phone">
                    <span class="field-hint">شماره ثابت فروشگاه را با پیش‌شماره وارد کنید.</span>
                    <div class="field-item full-width">
                        <label>بنر دستگاه</label>
                        <input type="file" name="banner">
                    </div>
                </div>

                <!-- Navigation buttons -->
                <div class="form-actions" style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <a href="{% url 'external_partners:vendor-update-user-profile' %}" class="btn-sub">بازگشت</a>
                    <button type="submit" class="btn-main">ثبت نهایی</button>
                </div>
            </form>

        </div>
    </main>

{% endblock content %}
