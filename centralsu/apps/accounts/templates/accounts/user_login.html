{% extends 'base.html' %}

{% block title %}User Login{% endblock title %}


{% block content %}

    <main class="auth-split-page">
        <div class="auth-split-panel">
            <div class="auth-split-glass-card">
                <h1 class="auth-split-title">ورود به پنل کاربری</h1>
                
                <form class="auth-split-form" method="post">
                    {% csrf_token %}
                    {{ form.non_field_errors }}
                    
                    <div class="auth-split-field">

                        <label>{{ form.phone_number.label }}</label>
                        <input type="text" placeholder="{{ form.phone_number_placeholder }}" name="phone_number">

                        <label class="mt-4">{{ form.password.label }}</label>
                        <input type="password" placeholder="{{ form.password_placeholder }}" name="password">

                    </div>

                    <button type="submit" class="btn-main">ورود</button>
                </form>
            </div>
        </div>
        
        <div class="auth-split-visual">
            <div class="auth-split-content">
                <h2 class="auth-split-headline">استقبال شما، افتخار ماست!</h2>
                <p class="auth-split-text">موج بزرگ انتقال کسب‌وکارها به زیرساخت‌های ایران‌سرور باعث ترافیک بالا شده است.</p>
            </div>
        </div>
    </main>

{% endblock content %}
